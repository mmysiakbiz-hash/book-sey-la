<!-- Blank-screen diagnostic. Captures script AND resource-load failures, and runs
     a 6s watchdog: if #root is still empty, it dumps exactly which stage failed
     (which globals loaded, studio count, captured error) so a "dead" screen turns
     into a readable report. Never clobbers a mounted app. -->
<script>
(function () {
  window.__seyErr = "";
  function render(html) {
    try {
      var el = document.getElementById("root");
      if (!el || el.childElementCount > 0) return; // app rendered — leave it alone
      el.innerHTML = '<div style="padding:24px 20px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;color:#23201E">' + html
        + '<button onclick="location.reload()" style="margin-top:18px;padding:11px 20px;border-radius:999px;border:none;background:#23201E;color:#fff;font-weight:600">Reload</button></div>';
    } catch (_) {}
  }
  // Capture phase catches resource (script/css/img) load failures too.
  window.addEventListener("error", function (e) {
    if (e && e.target && e.target !== window && (e.target.src || e.target.href)) {
      window.__seyErr = window.__seyErr || ("LOAD FAIL: " + (e.target.src || e.target.href));
    } else if (e && e.message) {
      window.__seyErr = window.__seyErr || (e.message + (e.lineno ? (" :" + e.lineno) : ""));
    }
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    var r = e && e.reason; window.__seyErr = window.__seyErr || ("Promise: " + ((r && (r.message || r)) || "unknown"));
  });
  // Watchdog: 6s after load, if nothing rendered, show a status dump.
  window.addEventListener("load", function () {
    setTimeout(function () {
      var el = document.getElementById("root");
      if (!el || el.childElementCount > 0) return;
      var g = function (x) { return typeof window[x] !== "undefined"; };
      var status = [
        ["React", g("React")], ["ReactDOM", g("ReactDOM")],
        ["supabase", !!(window.supabase && window.supabase.createClient)],
        ["SEY_DATA", !!window.SEY_DATA], ["SEY_UI", !!window.SEY_UI], ["SEY_BOOK", !!window.SEY_BOOK],
        ["studios", (window.SEY_DATA && window.SEY_DATA.STUDIOS ? window.SEY_DATA.STUDIOS.length : "n/a")]
      ].map(function (p) { return p[0] + ": " + p[1]; }).join("  ·  ");
      render('<div style="font-weight:700;font-size:17px;margin-bottom:10px">sey.la — diagnostyka</div>'
        + '<div style="font-size:12px;color:#6E6863;white-space:pre-wrap;word-break:break-word;line-height:1.6">' + status + '</div>'
        + '<div style="font-size:12px;color:#B4341F;white-space:pre-wrap;word-break:break-word;margin-top:10px">ERR: ' + (window.__seyErr || "(brak przechwyconego błędu)") + '</div>');
    }, 6000);
  });
})();
</script>
<!-- Self-hosted React (production UMD) — no CDN, works offline behind strict CSP. -->
<script src="./vendor/react.production.min.js"></script>

<body>
<div id="root"></div>

<script src="data.js"></script>

<script>
  // No service worker is registered anymore (a cache-first SW kept wedging devices
  // on a stale build). We still clean up any SW an older visit left behind, so the
  // app always loads fresh from the network.
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (r) { r.unregister().catch(function () {}); });
    }).catch(function () {});
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k).catch(function () {}); }); }).catch(function () {});
    }
  }
</script>
</body>
